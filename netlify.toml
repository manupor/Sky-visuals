[build]
  publish = "public"
  command = "echo 'No build needed - static site'"

[[redirects]]
  from = "/*"
  to = "/dugem-style.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
